server {
    listen 80;
    server_name qhpresearch.com www.qhpresearch.com;

    root /opt/qhp-demo;
    index index.html;

    # --- Password Protection (HTTP Basic Auth) ---
    # To enable server-level auth (recommended as a second layer):
    #   1. SSH into 107.172.187.251
    #   2. Run: apt-get install -y apache2-utils
    #   3. Run: htpasswd -c /etc/nginx/.htpasswd qhp
    #      (enter your chosen password when prompted)
    #   4. Uncomment the two lines below
    #   5. Restart nginx: systemctl restart nginx
    #
    # auth_basic "QHP Research — Authorized Access Only";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ =404;
    }
}
